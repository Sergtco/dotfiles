
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1920x1080@144,auto,1

#Window rules
source = ~/.config/hypr/windowrules.conf


# Environment variables
source = ~/.config/hypr/env.conf

# binds
$mainMod = SUPER
source = ~/.config/hypr/bind.conf

# Execute your favorite apps at launch

# Slow app run fix
exec-once =  dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland
exec-once = ~/.config/hypr/xdg_fix.sh

exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = udiskie & hyprpaper
exec-once = sleep 5s && telegram-desktop

exec-once = hypridle 
exec-once = sleep 2s && waybar & swaync
exec-once = hyprctl dispatch exec [workspace 10 silent] "firefox --new-window https://music.youtube.com"
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,ru
    kb_variant = 
    kb_model =
    kb_options = grp:win_space_toggle, ctrl:swapcaps
    kb_rules =

    follow_mouse = 1   
    touchpad {
        natural_scroll = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 2
    gaps_out = 3
    border_size = 0
    col.active_border =  0xffC0CAF5
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
}
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vrr = 1
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    blur {
        enabled = false
        size = 3
        passes = 1
    }

    drop_shadow = false
    # shadow_range = 5
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
    dim_inactive = true
    dim_strength = 0.1
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more


    animation = windows, 1, 5, default 
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

